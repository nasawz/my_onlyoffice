# 反向代理后端的 /uploads 和 /api 路径，解决插件跨域问题
# 后端容器名 onlyoffice-ai-backend 通过 Docker 内部 DNS 解析

location /uploads/ {
  proxy_pass http://onlyoffice-ai-backend:3000/uploads/;
  proxy_set_header Host $host;
  proxy_cache_bypass 1;
  proxy_no_cache 1;
}

location /api/ {
  proxy_pass http://onlyoffice-ai-backend:3000/api/;
  proxy_set_header Host $host;
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;
}
